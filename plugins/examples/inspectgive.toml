requires = ["WeaponPaints"]

[source]
type = "github_release"
repo = "njyeung/InspectGive"
asset = '^InspectGive\.zip$'

[[layout]]
from = "InspectGive"
to = "addons/counterstrikesharp/plugins/InspectGive"

[[template]]
path = "addons/counterstrikesharp/configs/plugins/InspectGive/InspectGive.json"
body= '''
{
  "DatabaseHost": "${db.host}",
  "DatabasePort": ${db.port},
  "DatabaseName": "${db.name}",
  "DatabaseUser": "${db.user}",
  "DatabasePassword": "${db.pass}",
  "ApplyToBothTeams": true,
  "ChatTriggerPrefix": "csgo_econ_action_preview",
  "Command": "inspect",
  "ConfigVersion": 1
}
'''