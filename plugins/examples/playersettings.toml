[source]
type = "github_release"
repo = "NickFox007/PlayerSettingsCS2"
asset = '^PlayerSettings\.zip$'

# Render the same DB params WeaponPaints uses so both plugins share storage.
[[template]]
path = "addons/counterstrikesharp/configs/plugins/PlayerSettings/PlayerSettings.json"
body = '''
{
  "DatabaseParams": {
    "Host": "${db.host}:${db.port}",
    "Name": "${db.name}",
    "User": "${db.user}",
    "Password": "${db.pass}",
    "Table": "settings_"
  },
  "ConfigVersion": 1
}
'''
