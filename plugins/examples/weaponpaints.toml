# WeaponPaints — skins/knives/gloves/agents, backed by MariaDB.
#
# Shape E: the archive has no single root. A `WeaponPaints/` plugin folder (with
# its own data/gamedata/lang inside) sits next to a sibling top-level `gamedata/`,
# and the two go to different places.
name     = "WeaponPaints"
requires = ["AnyBaseLib", "PlayerSettings", "MenuManager"]

# WeaponPaints ships Windows-only native libs under runtimes/win — drop them.
ignore = ["**/runtimes/win/**", "__MACOSX/**"]

[source]
type  = "github_release"
repo  = "Nereziel/cs2-WeaponPaints"
asset = '^WeaponPaints\.zip$'
# version = "build-423"   # pin a tag; defaults to latest

[[layout]]
from = "WeaponPaints"          # the plugin folder itself
to   = "addons/counterstrikesharp/plugins/WeaponPaints"

[[layout]]
from = "gamedata"              # the sibling, shared, top-level gamedata
to   = "addons/counterstrikesharp/gamedata"


[[template]]
path = "addons/counterstrikesharp/configs/plugins/WeaponPaints/WeaponPaints.json"
body = '''
{
  "DatabaseHost": "${db.host}",
  "DatabasePort": ${db.port},
  "DatabaseName": "${db.name}",
  "DatabaseUser": "${db.user}",
  "DatabasePassword": "${db.pass}",
  "Additional": {
    "CommandKnife": [ "knife", "knifes", "knives" ],
    "CommandSkin": [ "ws", "skin", "skins" ],
    "CommandRefresh": [ "wp" ],
    "CommandWpEnabled": true,
    "CommandWearUpdate": true,
    "GiveRandomSkin": false,
    "SkinEnabled": true,
    "KnifeEnabled": true,
    "GloveEnabled": true,
    "AgentEnabled": true,
    "MusicEnabled": true,
    "StickerEnabled": true,
    "KeychainEnabled": true
  }
}
'''
